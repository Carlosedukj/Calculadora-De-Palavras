<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Calculadora de Palavras</title>
</head>

<body>

  <div class="container">
    <h1>Contador de Palavras</h1>
    <textarea name="text-area" id="text"></textarea>
    <button id="clear-all">Limpar Tudo</button>
    <!-- <p id="error-message"></p> -->
    <div class="cards-row">
      <p id="quantity-word">Palavras: 0 </p>
      <p id="quantity-caracters">Caracteres: 0</p>
      <p id="number-of-spaces">Espaços: 0</p>
    </div>

  </div>
  <script src="script.js"></script>
</body>

</html>
